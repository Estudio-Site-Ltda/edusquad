# EduSquad Best Practices Catalog
# Mapeamento de formatos e frameworks pedagógicos disponíveis

version: "1.0.0"
updated: "2026-03-13"

pedagogical_frameworks:
  - id: bloom-taxonomy
    name: Taxonomia de Bloom
    file: bloom-taxonomy.md
    description: Alinha objetivos de aprendizagem aos 6 níveis cognitivos
    applies_to: [todos os formatos]

  - id: instructional-design
    name: Design Instrucional (ADDIE)
    file: instructional-design.md
    description: Processo estruturado de desenvolvimento de conteúdo educacional
    applies_to: [curso-online, scorm, apostila, trilha]

  - id: active-learning
    name: Aprendizagem Ativa
    file: active-learning.md
    description: PBL, sala invertida, gamificação e outras metodologias ativas
    applies_to: [plano-de-aula, quiz, trilha]

  - id: corporate-training
    name: Treinamento Corporativo
    file: corporate-training.md
    description: Kirkpatrick 4 níveis, modelo 70-20-10, T&D corporativo
    applies_to: [treinamento, apresentacao, quiz]

  - id: accessibility
    name: Acessibilidade
    file: accessibility.md
    description: WCAG, inclusão, diversidade e acessibilidade em materiais educacionais
    applies_to: [todos os formatos]

delivery_formats:
  - id: video-script
    name: Roteiro de Vídeo
    file: video-script.md
    description: Script completo com cenas, narração e dicas de produção
    icon: "🎬"

  - id: slide-design
    name: Apresentação (Slides)
    file: slide-design.md
    description: Estrutura de slides com notas do apresentador e design guide
    icon: "📊"

  - id: pdf-layout
    name: PDF Educacional
    file: pdf-layout.md
    description: Material de apoio com teoria, exemplos e exercícios
    icon: "📄"

  - id: apostila
    name: Apostila Completa
    file: apostila.md
    description: Material didático linear com referências e atividades
    icon: "📚"

  - id: lesson-plan
    name: Plano de Aula
    file: lesson-plan.md
    description: Objetivo, metodologia, recursos, avaliação e temporização
    icon: "📋"

  - id: quiz-design
    name: Quiz e Avaliação
    file: quiz-design.md
    description: Questões objetivas, dissertativas, rubricas e feedback
    icon: "✅"

  - id: mind-map
    name: Mapa Mental
    file: mind-map.md
    description: Estrutura visual hierárquica dos conceitos-chave
    icon: "🗺️"

  - id: flowchart
    name: Fluxograma
    file: flowchart.md
    description: Diagrama de processos ou jornada de aprendizagem
    icon: "🔀"

  - id: scorm-structure
    name: SCORM (e-learning)
    file: scorm-structure.md
    description: Módulo e-learning interativo compatível com LMS
    icon: "💻"

  - id: learning-trail
    name: Trilha de Aprendizagem
    file: learning-trail.md
    description: Sequência de módulos com pré-requisitos e progressão
    icon: "🛤️"

visual_skills:
  # Skills que geram arquivos HTML interativos standalone
  - id: flowchart-creator
    name: Flowchart Creator
    skill_path: skills/flowchart-creator/SKILL.md
    output: fluxograma.html
    description: Fluxograma interativo estilo quadro-negro — sequência didática, ADDIE, trilha adaptativa
    icon: "🔀"
    triggers: [fluxograma, flowchart, mapa de processo, sequência didática visual]

  - id: mind-map-creator
    name: Mind Map Creator
    skill_path: skills/mind-map-creator/SKILL.md
    output: mapa-mental.html
    description: Mapa mental dark mode premium — estrutura de curso, Bloom, BNCC, competências
    icon: "🗺️"
    triggers: [mapa mental, mind map, mapa conceitual, visão geral do curso, estrutura de módulo]

assessment_skills:
  - id: quiz-builder
    name: Quiz Builder
    skill_path: skills/quiz-builder/SKILL.md
    outputs: [quiz.json, quiz.html, quiz-h5p.json]
    description: Avaliações e quizzes — múltipla escolha, V/F, lacuna, correspondência, ordenação
    icon: "✅"
    triggers: [quiz, avaliação, prova, questões, banco de questões, atividade de fixação]

  - id: scorm-builder
    name: SCORM Builder
    skill_path: skills/scorm-builder/SKILL.md
    outputs: [scorm/course.zip]
    description: Pacote SCORM 1.2 completo com rastreamento, quiz e player HTML — upload direto no LMS
    icon: "💻"
    triggers: [scorm, pacote e-learning, módulo para LMS, curso interativo, moodle, hotmart]

design_skills:
  - id: canva
    name: Canva
    skill_path: skills/canva/SKILL.md
    type: mcp
    mcp_server: claude_ai_Canva
    description: Apresentações, infográficos, capas de curso e materiais visuais via Canva MCP
    icon: "🎨"
    triggers: [canva, infográfico, capa de curso, design, material visual, apresentação no canva]

  - id: gamma
    name: Gamma
    skill_path: skills/gamma/SKILL.md
    type: mcp
    mcp_server: claude_ai_Gamma
    description: Apresentações, documentos e páginas web educacionais gerados por IA via Gamma MCP
    icon: "⚡"
    triggers: [gamma, apresentação com ia, módulo visual, página de curso, resumo interativo]

domain_skills:
  - id: bncc
    name: BNCC
    skill_path: skills/bncc/SKILL.md
    reference: skills/bncc/bncc-reference.md
    pdf: skills/bncc/BNCC_EI_EF_versaofinal.pdf
    description: Alinhamento com a Base Nacional Comum Curricular — competências, habilidades e componentes curriculares
    icon: "🏫"
    triggers: [bncc, alinhamento curricular, habilidades, competências, componente curricular, educação básica]

  - id: rh-training
    name: RH Training
    skill_path: skills/rh-training/SKILL.md
    description: T&D corporativo — Kirkpatrick 4 níveis, modelo 70-20-10, ANT, ROI de treinamento
    icon: "💼"
    triggers: [treinamento corporativo, t&d, capacitação, onboarding, trilha de liderança, kirkpatrick]

  - id: accessibility
    name: Accessibility
    skill_path: skills/accessibility/SKILL.md
    description: Acessibilidade e inclusão — WCAG 2.1, DUA/UDL, Libras, dislexia, neurodiversidade
    icon: "♿"
    triggers: [acessibilidade, inclusão, wcag, libras, audiodescrição, dua, diversidade]

  - id: storyboard
    name: Storyboard
    skill_path: skills/storyboard/SKILL.md
    outputs: [storyboard.md, storyboard.html]
    description: Storyboard frame a frame para produção de vídeos educacionais — planos, narração, B-roll, grafismos
    icon: "🎬"
    triggers: [storyboard, planejamento de vídeo, roteiro visual, plano de cenas, frames]

orchestration_skills:
  - id: squad-templates
    name: Squad Templates
    skill_path: skills/squad-templates/SKILL.md
    description: Templates prontos de squads para os 5 cenários mais comuns — curso online, RH, BNCC, microlearning, trilha
    icon: "🗂️"
    templates: [curso-online, treinamento-corporativo, aula-bncc, microlearning, trilha-aprendizagem]
